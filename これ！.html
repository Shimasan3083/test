<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Touch Comet Chase</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game-shell" aria-label="Touch Comet Chase">
      <canvas id="game" aria-label="画面をタッチして彗星を動かし、星を集める2Dゲーム"></canvas>
      <section class="hud" aria-live="polite">
        <p>Score <strong id="score">0</strong></p>
        <p>Best <strong id="best">0</strong></p>
      </section>
      <section id="message" class="message">
        <h1>Touch Comet Chase</h1>
        <p>画面をタッチしたまま動かして、光る星を集めよう。</p>
        <p>赤い隕石に当たるとゲームオーバー。タップでスタート！</p>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
